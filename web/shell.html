<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Evolution - WebAssembly Edition</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #canvas {
      display: block;
      max-width: 100%;
      max-height: 100vh;
      border: 2px solid #00e5ff;
      box-shadow: 0 0 30px rgba(0, 229, 255, 0.3);
      cursor: none;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #00e5ff;
      font-size: 24px;
      z-index: 1000;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .spinner {
      width: 40px;
      height: 40px;
      margin: 20px auto;
      border: 3px solid rgba(0, 229, 255, 0.3);
      border-top-color: #00e5ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #error {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 45, 123, 0.2);
      border: 2px solid #ff2d7b;
      color: #ff2d7b;
      padding: 20px;
      border-radius: 8px;
      max-width: 500px;
      text-align: center;
      display: none;
      z-index: 1000;
    }
  </style>
</head>

<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Loading Snake Evolution...</p>
  </div>
  <div id="error"></div>
  <canvas id="canvas"></canvas>

  <script>
    // Emscripten module configuration
    var Module = {
      canvas: document.getElementById('canvas'),
      preRun: [],
      postRun: [],
      print: (text) => console.log(text),
      printErr: (text) => console.error(text),
      onRuntimeInitialized: function () {
        document.getElementById('loading').style.display = 'none';
        console.log('Snake Evolution WASM loaded successfully');
      },
      onAbort: function (what) {
        console.error('WASM initialization failed:', what);
        showError('Failed to load game. Please refresh the page.');
      }
    };

    function showError(message) {
      const errorEl = document.getElementById('error');
      errorEl.textContent = message;
      errorEl.style.display = 'block';
      document.getElementById('loading').style.display = 'none';
    }

    // Load the WASM module
    // The {{{ SCRIPT }}} will be replaced by Emscripten with the actual script tag
  </script>
  {{{ SCRIPT }}}
</body>

</html>
